name: Release

on:
  release:
    types: [created]

jobs:

  release-job:
    name: Release Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.12

      - name: Build package using ros_release_python
        run: |
          git clone https://github.com/ros-infrastructure/ros_release_python.git

          # Build the docker image
          cd ros_release_python
          docker build -t rrp .

          # Run the release process inside the container
          docker run --rm \
            -v "$(pwd)/../vcs2l:/projects" \
            -v "$(pwd)/../vcs2l/dist:/projects/dist" \
            rrp \
            bash -c "cd /projects/vcs2l && /ros_release_python/scripts/ros_release_python pip"

      - name: Upload assets to release
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
